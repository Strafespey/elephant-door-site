<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elephant Door</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2a1c3a 0%, #12071f 100%);
      color: #eee;
      padding: 2rem;
      text-align: center;
    }
    h1 {
      font-size: clamp(1.75rem, 5vw, 2.5rem);
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    p {
      color: #aaa;
      max-width: 32ch;
      margin-bottom: 1.5rem;
    }
    .game-widget {
      margin-top: 0.5rem;
    }
    .game-widget iframe {
      display: block;
      border: none;
    }
    .blog-link {
      color: #aaa;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
    }
    .blog-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #5b6ffa;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      transition: background 0.2s;
    }
    .blog-btn:hover {
      background: #4a5cd9;
    }
    .contact-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.75rem 2rem;
      background: transparent;
      color: #fff;
      border: 1px solid #5b6ffa;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s;
    }
    .contact-btn:hover {
      background: rgba(91, 111, 250, 0.15);
    }
    .contact-email {
      margin-top: 1rem;
      color: #eee;
      font-size: 1rem;
    }
    .contact-email a {
      color: #5b6ffa;
      text-decoration: none;
    }
    .contact-email a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>Elephant Door</h1>
  <p>Check out my game!</p>
  <div class="game-widget">
    <iframe frameborder="0" src="https://itch.io/embed/2620878?bg_color=432a5e&amp;fg_color=ffffff&amp;link_color=5b6ffa&amp;border_color=432a5e" width="552" height="167"><a href="https://strafespey.itch.io/warlock">Warlock: Age of Entropy by strafespey</a></iframe>
  </div>
  <p class="blog-link">or read my blog!</p>
  <a class="blog-btn" href="/blog">Blog</a>
  <button class="contact-btn" type="button" onclick="
    this.style.display='none';
    document.getElementById('contact-email').hidden=false;
  ">Contact Me</button>
  <p id="contact-email" class="contact-email" hidden>
    <a href="mailto:strafespey@gmail.com">strafespey@gmail.com</a>
  </p>
</body>
</html>
